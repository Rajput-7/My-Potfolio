<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animation - Fixed</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            overflow-x: hidden; 
        }
        canvas {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            /* આનાથી કેનવાસ સ્ક્રીન મુજબ સેટ થશે */
            width: 100vw;
            height: 100vh;
            object-fit: contain; 
        }
        .spacer { height: 2400vh; }
    </style>
</head>
<body>

    <canvas id="hero-lightpass"></canvas>
    <div class="spacer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        const canvas = document.getElementById("hero-lightpass");
        const context = canvas.getContext("2d");

        const frameCount = 276;
        const currentFrame = index => `./R/1 (${index + 1}).png`;

        const images = [];
        const airpods = { frame: 0 };

        for (let i = 0; i < frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            images.push(img);
        }

        gsap.to(airpods, {
            frame: frameCount - 1,
            snap: "frame",
            ease: "none",
            scrollTrigger: {
                scrub: 2,
                trigger: ".spacer",
                start: "top top",
                end: "bottom bottom",
            },
            onUpdate: render
        });

        images[0].onload = () => {
            // પહેલી ઈમેજ લોડ થાય ત્યારે કેનવાસની સાઈઝ ઈમેજ મુજબ સેટ કરો
            canvas.width = images[0].width;
            canvas.height = images[0].height;
            render();
        };

        function render() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            if (images[airpods.frame]) {
                context.drawImage(images[airpods.frame], 0, 0);
            }
        }

        // પેજ રીસાઈઝ થાય તો પણ સેટિંગ જળવાઈ રહે તે માટે
        window.addEventListener("resize", () => {
            render();
        });
    </script>
</body>

</html>
